name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill metadata
        run: python3 scripts/validate_skill.py --root .

      - name: Scan for secrets
        run: python3 skill/obsidian-memory-closeout/scripts/secret_scan.py .

      - name: Verify package
        run: python3 scripts/package_skill.py --root . --check
